<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Keranjang - Kriuk Bareng</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-gray-100">

  <!-- Navbar -->
  <nav class="bg-red-600 text-white shadow-lg">

    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">

      <h1 class="text-2xl font-bold">
        Kriuk Bareng
      </h1>

      <div class="space-x-4">

        <a href="index.html" class="hover:text-yellow-300">
          Beranda
        </a>

        <a href="produk.html" class="hover:text-yellow-300">
          Produk
        </a>

        <a href="cart.html" class="font-bold text-yellow-300">
          Keranjang
          <span
            id="cart-count"
            class="bg-yellow-400 text-black text-xs px-2 py-1 rounded-full ml-1">
            0
          </span>
        </a>

        <a href="login.html" class="hover:text-yellow-300">
          Login
        </a>

      </div>

    </div>

  </nav>

  <!-- Header -->
  <section class="bg-yellow-400 py-10">

    <div class="max-w-7xl mx-auto px-4 text-center">

      <h2 class="text-4xl font-bold text-black">
        Keranjang Belanja
      </h2>

      <p class="mt-3 text-black">
        Periksa kembali pesanan Anda
      </p>

    </div>

  </section>

  <!-- Content -->
  <section class="max-w-7xl mx-auto px-4 py-10">

    <div class="grid md:grid-cols-3 gap-6">

      <!-- Daftar Produk -->
      <div class="md:col-span-2">

        <div id="cart-items">

        </div>

      </div>

      <!-- Ringkasan -->
      <div>

        <div class="bg-white rounded-xl shadow-card p-6">

          <h3 class="text-2xl font-bold mb-6">
            Ringkasan Pesanan
          </h3>

          <div class="flex justify-between mb-4">

            <span>Subtotal</span>

            <span id="subtotal">
              Rp0
            </span>

          </div>

          <hr class="my-4">

          <div class="flex justify-between text-xl font-bold">

            <span>Total</span>

            <span id="total">
              Rp0
            </span>

          </div>

          <a
            href="checkout.html"
            class="block mt-6 text-center bg-red-600 text-white py-3 rounded-lg hover:bg-red-700">

            Checkout

          </a>

          <button
            onclick="clearCart()"
            class="w-full mt-3 bg-gray-800 text-white py-3 rounded-lg hover:bg-black">

            Kosongkan Keranjang

          </button>

        </div>

      </div>

    </div>

  </section>

  <!-- Footer -->
  <footer class="bg-black text-white py-8 mt-10">

    <div class="max-w-7xl mx-auto px-4 text-center">

      <h3 class="text-xl font-bold">
        Kriuk Bareng
      </h3>

      <p class="mt-2">
        Keripik Stick Baso Kering Aneka Rasa
      </p>

      <p class="mt-2 text-sm text-gray-400">
        © 2026 Kriuk Bareng
      </p>

    </div>

  </footer>

  <script src="assets/js/cart.js"></script>

</body>
  </html>
