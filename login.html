<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login - Kriuk Bareng</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-gray-100 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-red-600 text-white shadow-lg">

    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">

      <h1 class="text-2xl font-bold">
        Kriuk Bareng
      </h1>

      <div class="space-x-4">
        <a href="index.html">Beranda</a>
        <a href="produk.html">Produk</a>
        <a href="cart.html">Keranjang</a>
      </div>

    </div>

  </nav>

  <!-- Login Form -->
  <div class="flex justify-center items-center py-12 px-4">

    <div class="bg-white shadow-card rounded-xl p-8 w-full max-w-md">

      <div class="text-center mb-8">

        <h2 class="text-3xl font-bold text-red-600">
          Login
        </h2>

        <p class="text-gray-500 mt-2">
          Masuk ke akun Kriuk Bareng
        </p>

      </div>

      <form id="login-form">

        <div class="mb-4">

          <label class="block mb-2">
            Email
          </label>

          <input
            type="email"
            id="email"
            class="form-input"
            required>

        </div>

        <div class="mb-6">

          <label class="block mb-2">
            Password
          </label>

          <input
            type="password"
            id="password"
            class="form-input"
            required>

        </div>

        <button
          type="submit"
          class="w-full bg-red-600 text-white py-3 rounded-lg hover:bg-red-700">

          Login

        </button>

      </form>

      <div class="my-6 text-center text-gray-400">
        atau
      </div>

      <button
        id="google-login"
        class="w-full border border-gray-300 py-3 rounded-lg hover:bg-gray-50">

        Login dengan Google

      </button>

      <div class="text-center mt-6">

        <p class="text-gray-600">

          Belum punya akun?

          <a
            href="register.html"
            class="text-red-600 font-bold">

            Daftar

          </a>

        </p>

      </div>

    </div>

  </div>

  <script
  type="module"
  src="assets/js/auth.js">
  </script>

</body>

</html>
