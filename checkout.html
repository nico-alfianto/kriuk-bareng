<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Checkout - Kriuk Bareng</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-gray-100">

  <!-- Navbar -->
  <nav class="bg-red-600 text-white shadow-lg">

    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">

      <h1 class="text-2xl font-bold">
        Kriuk Bareng
      </h1>

      <div class="space-x-4">

        <a href="index.html">Beranda</a>
        <a href="produk.html">Produk</a>
        <a href="cart.html">Keranjang</a>

      </div>

    </div>

  </nav>

  <!-- Header -->
  <section class="bg-yellow-400 py-10">

    <div class="max-w-6xl mx-auto px-4 text-center">

      <h2 class="text-4xl font-bold">
        Checkout
      </h2>

      <p class="mt-3">
        Lengkapi data pemesanan Anda
      </p>

    </div>

  </section>

  <!-- Checkout -->
  <section class="max-w-6xl mx-auto px-4 py-10">

    <div class="grid md:grid-cols-2 gap-6">

      <!-- Form -->
      <div class="bg-white rounded-xl shadow-card p-6">

        <h3 class="text-2xl font-bold mb-6">
          Data Pelanggan
        </h3>

        <form id="checkout-form">

          <div class="mb-4">
            <label>Nama Lengkap</label>
            <input
              type="text"
              id="nama"
              class="form-input mt-2"
              required>
          </div>

          <div class="mb-4">
            <label>No WhatsApp</label>
            <input
              type="tel"
              id="wa"
              class="form-input mt-2"
              required>
          </div>

          <div class="mb-4">
            <label>Email</label>
            <input
              type="email"
              id="email"
              class="form-input mt-2">
          </div>

          <div class="mb-4">
            <label>Alamat Lengkap</label>
            <textarea
              id="alamat"
              rows="4"
              class="form-input mt-2"
              required></textarea>
          </div>

          <div class="mb-4">

            <label>Metode Pengiriman</label>

            <select
              id="pengiriman"
              class="form-input mt-2">

              <option value="Ambil di Toko">
                Ambil di Toko
              </option>

              <option value="Kurir">
                Kurir
              </option>

            </select>

          </div>

          <div class="mb-4">

            <label>Metode Pembayaran</label>

            <select
              id="pembayaran"
              class="form-input mt-2">

              <option value="QRIS">QRIS</option>
              <option value="DANA">DANA</option>
              <option value="OVO">OVO</option>
              <option value="GoPay">GoPay</option>
              <option value="BCA">Transfer BCA</option>
              <option value="BRI">Transfer BRI</option>
              <option value="Mandiri">Transfer Mandiri</option>

            </select>

          </div>

          <button
            type="submit"
            class="w-full bg-red-600 text-white py-3 rounded-lg hover:bg-red-700">

            Buat Pesanan

          </button>

        </form>

      </div>

      <!-- Ringkasan -->
      <div class="bg-white rounded-xl shadow-card p-6">

        <h3 class="text-2xl font-bold mb-6">
          Ringkasan Pesanan
        </h3>

        <div id="checkout-items">

        </div>

        <hr class="my-4">

        <div class="flex justify-between text-xl font-bold">

          <span>Total</span>

          <span id="checkout-total">
            Rp0
          </span>

        </div>

      </div>

    </div>

  </section>

  <!-- Footer -->
  <footer class="bg-black text-white py-8 mt-10">

    <div class="max-w-7xl mx-auto px-4 text-center">

      <h3 class="text-xl font-bold">
        Kriuk Bareng
      </h3>

      <p class="text-gray-400 mt-2">
        © 2026 Kriuk Bareng
      </p>

    </div>

  </footer>

  <script>

    const cart =
      JSON.parse(
        localStorage.getItem("cart")
      ) || [];

    const checkoutItems =
      document.getElementById(
        "checkout-items"
      );

    const totalElement =
      document.getElementById(
        "checkout-total"
      );

    let total = 0;

    function rupiah(number) {

      return new Intl.NumberFormat(
        "id-ID",
        {
          style:"currency",
          currency:"IDR"
        }
      ).format(number);

    }

    cart.forEach(item => {

      const subtotal =
        item.harga * item.qty;

      total += subtotal;

      checkoutItems.innerHTML += `
        <div class="flex justify-between mb-3">

          <div>
            ${item.nama}
            (${item.qty}x)
          </div>

          <div>
            ${rupiah(subtotal)}
          </div>

        </div>
      `;

    });

    totalElement.textContent =
      rupiah(total);

    document
      .getElementById(
        "checkout-form"
      )
      .addEventListener(
        "submit",
        function(e){

          e.preventDefault();

          const order = {

            id:
              "KB-" +
              Date.now(),

            tanggal:
              new Date()
              .toLocaleString(),

            nama:
              document
                .getElementById("nama")
                .value,

            wa:
              document
                .getElementById("wa")
                .value,

            email:
              document
                .getElementById("email")
                .value,

            alamat:
              document
                .getElementById("alamat")
                .value,

            pengiriman:
              document
                .getElementById(
                  "pengiriman"
                ).value,

            pembayaran:
              document
                .getElementById(
                  "pembayaran"
                ).value,

            items: cart,

            total: total,

            status:
              "Pending"

          };

          const orders =
            JSON.parse(
              localStorage.getItem(
                "orders"
              )
            ) || [];

          orders.push(order);

          localStorage.setItem(
            "orders",
            JSON.stringify(
              orders
            )
          );

          localStorage.removeItem(
            "cart"
          );

          alert(
            "Pesanan berhasil dibuat!"
          );

          window.location.href =
            "index.html";

        }
      );

  </script>

</body>
              </html>
