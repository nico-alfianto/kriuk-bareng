<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard Admin - Kriuk Bareng</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body class="bg-gray-100">

  <div class="flex">

    <!-- Sidebar -->
    <aside class="admin-sidebar w-64">

      <div class="p-6">

        <h2 class="text-2xl font-bold">
          Kriuk Bareng
        </h2>

        <p class="text-gray-400 text-sm mt-1">
          Admin Panel
        </p>

      </div>

      <nav>

        <a href="index.html">
          📊 Dashboard
        </a>

        <a href="produk.html">
          📦 Produk
        </a>

        <a href="pesanan.html">
          🛒 Pesanan
        </a>

        <a href="../index.html">
          🌐 Lihat Website
        </a>

      </nav>

    </aside>

    <!-- Content -->
    <main class="flex-1 p-6">

      <div class="mb-8">

        <h1 class="text-3xl font-bold">
          Dashboard Admin
        </h1>

        <p class="text-gray-500 mt-2">
          Ringkasan aktivitas toko Kriuk Bareng
        </p>

      </div>

      <!-- Statistik -->
      <div class="grid md:grid-cols-4 gap-6">

        <div class="bg-white rounded-xl shadow-card p-6">

          <h3 class="text-gray-500">
            Total Pesanan
          </h3>

          <p
            id="total-orders"
            class="text-4xl font-bold text-red-600 mt-2">
            0
          </p>

        </div>

        <div class="bg-white rounded-xl shadow-card p-6">

          <h3 class="text-gray-500">
            Total Produk
          </h3>

          <p
            id="total-products"
            class="text-4xl font-bold text-yellow-500 mt-2">
            0
          </p>

        </div>

        <div class="bg-white rounded-xl shadow-card p-6">

          <h3 class="text-gray-500">
            Pelanggan
          </h3>

          <p
            id="total-customers"
            class="text-4xl font-bold text-blue-600 mt-2">
            0
          </p>

        </div>

        <div class="bg-white rounded-xl shadow-card p-6">

          <h3 class="text-gray-500">
            Pendapatan
          </h3>

          <p
            id="total-income"
            class="text-3xl font-bold text-green-600 mt-2">
            Rp0
          </p>

        </div>

      </div>

      <!-- Pesanan Terbaru -->
      <div class="bg-white rounded-xl shadow-card p-6 mt-8">

        <div class="flex justify-between items-center mb-6">

          <h2 class="text-2xl font-bold">
            Pesanan Terbaru
          </h2>

          <a
            href="pesanan.html"
            class="bg-red-600 text-white px-4 py-2 rounded-lg">

            Lihat Semua

          </a>

        </div>

        <div class="overflow-x-auto">

          <table class="w-full">

            <thead>

              <tr class="border-b">

                <th class="text-left py-3">
                  ID
                </th>

                <th class="text-left py-3">
                  Nama
                </th>

                <th class="text-left py-3">
                  Total
                </th>

                <th class="text-left py-3">
                  Status
                </th>

              </tr>

            </thead>

            <tbody id="recent-orders">

            </tbody>

          </table>

        </div>

      </div>

    </main>

  </div>

  <script src="../assets/js/products.js"></script>
  <script src="../assets/js/admin.js"></script>

</body>

          </html>
