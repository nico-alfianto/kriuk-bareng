<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Produk - Kriuk Bareng</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-gray-50">

  <!-- Navbar -->
  <nav class="bg-red-600 text-white shadow-lg">

    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">

      <h1 class="text-2xl font-bold">
        Kriuk Bareng
      </h1>

      <div class="space-x-4">

        <a href="index.html" class="hover:text-yellow-300">
          Beranda
        </a>

        <a href="produk.html" class="hover:text-yellow-300 font-bold">
          Produk
        </a>

        <a href="cart.html" class="hover:text-yellow-300">
          Keranjang
          <span
            id="cart-count"
            class="bg-yellow-400 text-black text-xs px-2 py-1 rounded-full ml-1">
            0
          </span>
        </a>

        <a href="login.html" class="hover:text-yellow-300">
          Login
        </a>

      </div>

    </div>

  </nav>

  <!-- Header -->
  <section class="bg-yellow-400 py-10">

    <div class="max-w-7xl mx-auto px-4 text-center">

      <h2 class="text-4xl font-bold text-black">
        Produk Kriuk Bareng
      </h2>

      <p class="mt-3 text-black">
        Pilih rasa favoritmu dan nikmati kerenyahannya
      </p>

    </div>

  </section>

  <!-- Filter -->
  <section class="max-w-7xl mx-auto px-4 py-8">

    <div class="grid md:grid-cols-2 gap-4">

      <!-- Search -->
      <input
        type="text"
        id="search-input"
        placeholder="Cari produk..."
        class="form-input">

      <!-- Filter Kategori -->
      <select
        id="category-filter"
        class="form-input">

        <option value="all">
          Semua Kategori
        </option>

        <option value="Original">
          Original
        </option>

        <option value="Balado">
          Balado
        </option>

        <option value="BBQ">
          BBQ
        </option>

        <option value="Keju">
          Keju
        </option>

        <option value="Jagung Bakar">
          Jagung Bakar
        </option>

        <option value="Rumput Laut">
          Rumput Laut
        </option>

        <option value="Pedas">
          Pedas
        </option>

      </select>

    </div>

  </section>

  <!-- Produk -->
  <section class="max-w-7xl mx-auto px-4 pb-12">

    <div
      id="all-products"
      class="grid md:grid-cols-4 gap-6">

    </div>

  </section>

  <!-- Footer -->
  <footer class="bg-black text-white py-8">

    <div class="max-w-7xl mx-auto px-4 text-center">

      <h3 class="text-xl font-bold">
        Kriuk Bareng
      </h3>

      <p class="mt-2">
        Keripik Stick Baso Kering Aneka Rasa
      </p>

      <p class="mt-2 text-sm text-gray-400">
        © 2026 Kriuk Bareng
      </p>

    </div>

  </footer>

  <script src="assets/js/products.js"></script>
  <script src="assets/js/app.js"></script>

  <script>

    const searchInput =
      document.getElementById("search-input");

    const categoryFilter =
      document.getElementById("category-filter");

    function filterProducts() {

      const keyword =
        searchInput.value.toLowerCase();

      const category =
        categoryFilter.value;

      const container =
        document.getElementById("all-products");

      let filtered = products.filter(product => {

        const matchKeyword =
          product.nama
            .toLowerCase()
            .includes(keyword);

        const matchCategory =
          category === "all" ||
          product.kategori === category;

        return matchKeyword && matchCategory;
      });

      container.innerHTML = "";

      filtered.forEach(product => {

        container.innerHTML += `
          <div class="product-card">

            <img
              src="${product.gambar}"
              alt="${product.nama}"
              class="product-image">

            <div class="p-4">

              <span class="badge">
                ${product.kategori}
              </span>

              <h3 class="text-xl font-bold mt-3">
                ${product.nama}
              </h3>

              <p class="text-gray-600 text-sm mt-2">
                ${product.deskripsi}
              </p>

              <p class="price my-4">
                ${formatRupiah(product.harga)}
              </p>

              <button
                onclick="addToCart(${product.id})"
                class="w-full bg-red-600 text-white py-2 rounded-lg hover:bg-red-700">

                Tambah ke Keranjang

              </button>

            </div>

          </div>
        `;
      });

    }

    searchInput.addEventListener(
      "keyup",
      filterProducts
    );

    categoryFilter.addEventListener(
      "change",
      filterProducts
    );

  </script>

</body>
        </html>
